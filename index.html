<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Movex Packers and Movers | Truck Booking & Logistics</title>

<link rel="icon" href="https://res.cloudinary.com/dzrgofvqa/image/upload/q_auto:best/logo_yh8i1b">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "MovingCompany",
  "name": "Movex Packers and Movers",
  "url": "https://movx.co.in",
  "logo": "https://res.cloudinary.com/dzrgofvqa/image/upload/q_auto:best/logo_yh8i1b",
  "description": "Packers and Movers in Bangalore offering truck booking, logistics and relocation services.",
  "areaServed": {
    "@type": "Place",
    "name": "Bangalore, Karnataka"
  },
  "telephone": "+91-9945857502"
}
</script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

.seo-header {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(135deg, #141e30, #243b55, #1b2735);
}

.seo-header img { width: 120px; }
.seo-header h1 { font-size: 30px; margin: 10px 0; }

@media (max-width: 768px) {
  .seo-header h1 { font-size: 22px; }
}

iframe {
  width: 100%;
  border: none;
  display: block;
  overflow: hidden;
}

.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #141e30, #243b55, #1b2735);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
</style>
</head>

<body>

<div class="seo-header">
  <img src="https://res.cloudinary.com/dzrgofvqa/image/upload/q_auto:best/logo_yh8i1b">
  <h1>Movex Packers and Movers in Bangalore & Karnataka</h1>
  <p>Book trucks, track shipments easily with Movex</p>
</div>

<div class="loader" id="loader">🚚 Loading Movex...</div>

<iframe 
  id="zohoFrame"
  src="https://creatorapp.zohopublic.in/movex.support/movex/page-embed/Movex_Home/zrNZsOdwGQ3bdGsG161jDR9Y7hvWzx3WSaT6rywAQjnXqE8Omrr4jGN9KrQsjMuMY0pRW5wA3h2bYeE2C2az9MJ5X5VepfsCMYPG"
  scrolling="no">
</iframe>

<script>
const iframe = document.getElementById("zohoFrame");
const loader = document.getElementById("loader");

function setPerfectHeight() {
  const screenHeight = window.innerHeight;
  let height;

  const ua = navigator.userAgent;

  if (/iPhone|iPad|iPod/i.test(ua)) {
    height = screenHeight * 1.7; // iOS tweak
  } else if (/Android/i.test(ua)) {
    height = screenHeight * 1.6; // Android tweak
  } else if (window.innerWidth >= 768 && window.innerWidth < 1024) {
    height = screenHeight * 1.3; // Tablets
  } else {
    height = screenHeight * 1.2; // Desktop
  }

  iframe.style.height = height + "px";
}

iframe.onload = function() {
  try {
    const realHeight = iframe.contentWindow.document.body.scrollHeight;
    iframe.style.height = realHeight + "px";
  } catch (e) {
    setPerfectHeight();
  }
  loader.style.display = "none";
};

setPerfectHeight();

window.addEventListener("resize", setPerfectHeight);
window.addEventListener("orientationchange", setPerfectHeight);
</script>

</body>
</html>
